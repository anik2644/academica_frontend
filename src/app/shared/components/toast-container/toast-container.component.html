<div class="fixed bottom-6 right-6 z-[9999] flex flex-col gap-3">
  <div
    *ngFor="let toast of notificationService.toasts"
    class="flex items-center gap-3 rounded-2xl border px-5 py-3.5 text-sm font-medium shadow-lg backdrop-blur-sm"
    style="animation: fade-in-up 0.3s ease-out both"
    [ngClass]="toastClass(toast.type)"
  >
    <svg class="h-5 w-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
      <path *ngIf="toast.type === 'success'" stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
      <path *ngIf="toast.type === 'error'" stroke-linecap="round" stroke-linejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
      <path *ngIf="toast.type === 'info'" stroke-linecap="round" stroke-linejoin="round" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
      <path *ngIf="toast.type === 'warning'" stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
    </svg>
    <span>{{ toast.message }}</span>
    <button (click)="notificationService.removeToast(toast.id)" class="ml-2 opacity-60 hover:opacity-100">
      <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
</div>
