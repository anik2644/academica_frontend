<div>
  <!-- Page Header -->
  <app-page-header
    title="Dashboard"
    subtitle="Welcome back! Here's what's happening with your school."
  ></app-page-header>

  <!-- Stats Grid -->
  <div class="mb-8 grid grid-cols-1 gap-6 md:grid-cols-2 lg:grid-cols-3">
    <app-stat-card
      *ngFor="let stat of stats"
      [title]="stat.title"
      [value]="stat.value"
      [change]="stat.change"
      [icon]="stat.icon"
      [color]="stat.color"
    ></app-stat-card>
  </div>

  <!-- Charts Section -->
  <div class="grid grid-cols-1 gap-6 lg:grid-cols-2">
    <!-- Attendance Chart -->
    <div class="card p-6">
      <h3 class="mb-4 text-lg font-semibold text-gray-900">Monthly Attendance Rate</h3>
      <div class="flex h-64 items-center justify-center rounded-lg bg-gray-50">
        <p class="text-sm text-gray-600">
          Chart visualization coming soon - Monthly attendance rate data
        </p>
      </div>
    </div>

    <!-- Admission Status Chart -->
    <div class="card p-6">
      <h3 class="mb-4 text-lg font-semibold text-gray-900">Admission Application Status</h3>
      <div class="flex h-64 items-center justify-center rounded-lg bg-gray-50">
        <p class="text-sm text-gray-600">
          Chart visualization coming soon - Admission status breakdown
        </p>
      </div>
    </div>
  </div>

  <!-- Recent Activity Section -->
  <div class="mt-8 card p-6">
    <h3 class="mb-4 text-lg font-semibold text-gray-900">Recent Activity</h3>
    <div class="space-y-4">
      <div class="flex items-center gap-4 border-b border-gray-200 pb-4 last:border-b-0">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-blue-100">
          <svg class="h-6 w-6 text-blue-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6" />
          </svg>
        </div>
        <div class="flex-1">
          <p class="font-medium text-gray-900">New student enrollment</p>
          <p class="text-sm text-gray-600">2 hours ago</p>
        </div>
      </div>
      <div class="flex items-center gap-4 border-b border-gray-200 pb-4 last:border-b-0">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-green-100">
          <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="flex-1">
          <p class="font-medium text-gray-900">Admission approved</p>
          <p class="text-sm text-gray-600">4 hours ago</p>
        </div>
      </div>
      <div class="flex items-center gap-4 border-b border-gray-200 pb-4 last:border-b-0">
        <div class="flex h-10 w-10 items-center justify-center rounded-full bg-amber-100">
          <svg class="h-6 w-6 text-amber-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4v.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </div>
        <div class="flex-1">
          <p class="font-medium text-gray-900">Pending payment</p>
          <p class="text-sm text-gray-600">Today</p>
        </div>
      </div>
    </div>
  </div>
</div>
